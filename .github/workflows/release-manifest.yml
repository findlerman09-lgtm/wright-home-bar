name: Build release manifest

on:
  push:
    branches: [main]
    paths:
      - 'data-recipes-*.js'
      - 'data-wine.js'
      - 'data-adjunct-recipes-v4.js'
      - 'adjunct-bridge-v5.js'
      - 'expansion-v5-*.b64'
      - 'scripts/build-release-manifest.mjs'
      - '.github/workflows/release-manifest.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/build-release-manifest.mjs
      - name: Commit manifest when changed
        run: |
          if git diff --quiet -- release-manifest.json; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add release-manifest.json
          git commit -m 'Update release manifest'
          git push
